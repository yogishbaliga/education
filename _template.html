<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LESSON TITLE — Math &amp; Science Lab</title>
  <meta name="description" content="LESSON DESCRIPTION" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C19PRJPV7K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C19PRJPV7K');
  </script>

  <!-- All three theme fonts loaded upfront -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>

    /* ═══════════════════════════════════════════════════════
       THEME TOKENS
       ─────────────────────────────────────────────────────
       Theme A (Focused Explorer): set --accent + --accent-soft
         to match the subject (see subject palette in CLAUDE.md).
       Themes B and C keep their own identity colours — do NOT
       change --accent inside theme-b or theme-c.
    ═══════════════════════════════════════════════════════ */
    body.theme-a {
      /* ↓ Change these two to match the subject */
      --accent:      #1d6fa4;
      --accent-soft: #deeef9;

      --bg:      #f9f8f5;
      --surface: #ffffff;
      --border:  #e4e4e7;
      --ink:     #18181b;
      --muted:   #71717a;
      --hyp:     #18181b;
      --ok:      #16a34a;
      --ok-soft: #dcfce7;
      --radius:  16px;
      --shadow:  0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.07);
      --font:    'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body.theme-b {
      --accent:      #f59e0b;
      --accent-soft: rgba(245,158,11,.12);
      --bg:      #0f172a;
      --surface: #1e293b;
      --border:  rgba(255,255,255,.08);
      --ink:     #f1f5f9;
      --muted:   #94a3b8;
      --hyp:     #f59e0b;
      --ok:      #34d399;
      --ok-soft: rgba(52,211,153,.15);
      --radius:  10px;
      --shadow:  0 4px 24px rgba(0,0,0,.45);
      --font:    'Inter', system-ui, sans-serif;
    }
    body.theme-c {
      --accent:      #0d9488;
      --accent-soft: #ccfbf1;
      --bg:      #fef3c7;
      --surface: rgba(255,255,255,.86);
      --border:  rgba(255,255,255,.55);
      --ink:     #1e293b;
      --muted:   #64748b;
      --hyp:     #ef4444;
      --ok:      #0d9488;
      --ok-soft: rgba(13,148,136,.15);
      --radius:  24px;
      --shadow:  0 4px 6px rgba(0,0,0,.04), 0 16px 48px rgba(0,0,0,.1);
      --font:    'Nunito', system-ui, sans-serif;
    }

    /* ═══════════════════════════════════════════════════════
       RESET + BASE
    ═══════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.6;
      background: var(--bg);
      transition: color .3s, background-color .4s;
    }
    body.theme-c {
      background: linear-gradient(165deg, #fef3c7 0%, #fde68a 40%, #fbbf24 100%);
      background-attachment: fixed;
    }

    /* ═══════════════════════════════════════════════════════
       TOP BAR  —  back link + theme picker, sticky
    ═══════════════════════════════════════════════════════ */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: background .4s, border-color .3s;
    }
    .back-link {
      font-size: .82rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      transition: color .3s;
    }
    .back-link:hover { text-decoration: underline; }

    .picker {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pick-label {
      font-size: .74rem;
      font-weight: 700;
      color: var(--muted);
      margin-right: 2px;
      white-space: nowrap;
    }
    .pick-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 5px 7px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .76rem;
      font-weight: 700;
      color: var(--muted);
      transition: border-color .2s, color .2s, background .2s;
    }
    .pick-btn:hover  { border-color: var(--accent); color: var(--ink); }
    .pick-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .swatch {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(128,128,128,.2);
    }
    /* Fixed swatch colours — always represent the three themes */
    .swatch-a { background: conic-gradient(#f9f8f5 0 50%, #2563eb 50%); }
    .swatch-b { background: conic-gradient(#0f172a 0 50%, #f59e0b 50%); }
    .swatch-c { background: conic-gradient(#fde68a 0 50%, #0d9488 50%); }

    /* ═══════════════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════════════ */
    .hero {
      padding: 48px 24px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background .4s, border-color .3s;
    }
    .hero-badge {
      display: inline-block;
      padding: 5px 16px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 16px;
      transition: background .3s, color .3s;
    }
    .hero h1 {
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.1;
    }
    .hero h1 em { font-style: normal; color: var(--accent); transition: color .3s; }
    .hero p {
      margin-top: 12px;
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 52ch;
      margin-inline: auto;
    }

    /* ── Optional: formula display in hero ───────────
       Uncomment and use when the lesson has a key formula
       to showcase prominently.

    .formula-pill {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      border-radius: var(--radius);
      font-size: 1.6rem;
      font-weight: 800;
      transition: background .4s, color .3s, border-radius .4s;
    }
    .formula-pill sup { font-size: .6em; vertical-align: super; }
    ─────────────────────────────────────────────────── */

    /* ═══════════════════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════════════════ */
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ═══════════════════════════════════════════════════════
       CARD  —  the main content container
    ═══════════════════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      transition: background .4s, border-color .3s, border-radius .4s, box-shadow .4s;
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 18px;
    }
    .c-icon {
      width: 32px; height: 32px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: .88rem;
      flex-shrink: 0;
      transition: background .3s, color .3s, border-radius .4s;
    }
    .c-chip {
      padding: 3px 12px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-size: .73rem;
      font-weight: 800;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: background .3s, color .3s;
    }

    /* ═══════════════════════════════════════════════════════
       COMMON LESSON PATTERNS  (copy-paste as needed)
    ═══════════════════════════════════════════════════════ */

    /*
      ── Story / narrative text ────────────────────
      .story p { color: var(--muted); font-size: .95rem; line-height: 1.75; margin-bottom: 10px; }
      .story strong { color: var(--ink); }

      ── Callout / key idea box ────────────────────
      .callout {
        margin-top: 16px; padding: 13px 18px;
        background: var(--accent-soft); border-left: 3px solid var(--accent);
        border-radius: 0 10px 10px 0; font-size: .9rem; font-weight: 600;
        transition: background .3s, border-color .3s, border-radius .4s;
      }

      ── Slider row ───────────────────────────────
      .sl-row label {
        display: flex; justify-content: space-between; align-items: baseline;
        font-size: .86rem; font-weight: 700; margin-bottom: 9px;
      }
      .sl-row label .v { font-size: 1.15rem; color: var(--accent); font-variant-numeric: tabular-nums; }
      input[type=range] {
        width: 100%; appearance: none; -webkit-appearance: none;
        height: 6px; border-radius: 999px; background: var(--border); outline: none; cursor: pointer;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 20px; height: 20px;
        background: var(--accent); border: 3px solid var(--surface); border-radius: 50%;
      }
      input[type=range]::-moz-range-thumb {
        width: 20px; height: 20px; background: var(--accent);
        border: 3px solid var(--surface); border-radius: 50%; cursor: pointer;
      }

      ── Numbered steps ────────────────────────────
      .steps { display: flex; flex-direction: column; gap: 10px; }
      .step  { display: flex; align-items: flex-start; gap: 12px; }
      .step-n {
        width: 28px; height: 28px; background: var(--accent); color: #fff;
        border-radius: 50%; display: grid; place-items: center;
        font-size: .75rem; font-weight: 800; flex-shrink: 0; margin-top: 3px;
        transition: background .3s, border-radius .4s;
      }
      .step-box {
        flex: 1; padding: 11px 16px; background: var(--accent-soft);
        border-radius: calc(var(--radius) - 4px);
        transition: background .4s, border-radius .4s;
      }
      .step-lbl { color: var(--muted); font-size: .78rem; margin-bottom: 3px; }
      .step-eq  { font-weight: 700; font-size: .98rem; }
      .step-eq em { font-style: normal; color: var(--accent); transition: color .3s; }

      ── Insight / fun-fact block ──────────────────
      .insight {
        background: var(--accent); color: #fff;
        border-radius: var(--radius); padding: 24px 28px;
        transition: background .4s, border-radius .4s;
      }
      .insight .eyebrow {
        font-size: .72rem; font-weight: 800; letter-spacing: .07em;
        text-transform: uppercase; opacity: .75; margin-bottom: 8px;
      }
      .insight p { font-size: .95rem; line-height: 1.65; opacity: .92; }
      .insight strong { font-weight: 800; }

      ── Primary action button ─────────────────────
      .btn-primary {
        padding: 11px 28px; border: none; border-radius: 999px;
        background: var(--accent); color: white;
        font-size: .95rem; font-weight: 700; cursor: pointer;
        font-family: var(--font);
        transition: filter .15s;
      }
      .btn-primary:hover { filter: brightness(1.1); }
    */

    /* ═══════════════════════════════════════════════════════
       THEME-SPECIFIC STRUCTURAL OVERRIDES
       ─────────────────────────────────────────────────────
       These adjust layout and personality beyond colour.
       Copy any additional overrides you need below.
    ═══════════════════════════════════════════════════════ */

    /* ── Theme A: clean white hero ── */
    body.theme-a .hero {
      background: #fff;
      border-bottom: 1px solid #e4e4e7;
    }

    /* ── Theme B: dark hero + amber glow, card top stripe,
                  monospace accents ── */
    body.theme-b .hero {
      background: linear-gradient(180deg, #131f38 0%, #0f172a 100%);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    body.theme-b .hero::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(245,158,11,.15) 0%, transparent 60%);
      pointer-events: none;
    }
    body.theme-b .hero-badge {
      font-family: 'SF Mono','Fira Code', monospace;
      letter-spacing: .1em;
      border: 1px solid rgba(245,158,11,.3);
    }
    body.theme-b .card       { border-top: 2px solid var(--accent); }
    body.theme-b .card-head  { font-size: .82rem; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); font-family: 'SF Mono','Fira Code', monospace; }
    body.theme-b .c-icon     { display: none; }
    body.theme-b .c-chip     { display: none; }

    /* ── Theme C: transparent hero, frosted-glass cards ── */
    body.theme-c .hero  { background: transparent; }
    body.theme-c .card  { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    body.theme-c .c-icon { display: none; }

    /* ═══════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      .card     { padding: 20px 18px; }
      .wrap     { padding: 24px 16px 64px; gap: 18px; }
      .hero     { padding: 36px 18px 36px; }
      .top-bar  { padding: 8px 16px; }
    }

    /* ── Add your lesson-specific styles below this line ── */

  </style>
</head>
<body class="theme-a">

<!-- TOP BAR: back link + theme picker -->
<div class="top-bar">
  <a class="back-link" href="../index.html">← All lessons</a>
  <div class="picker" role="navigation" aria-label="Visual style">
    <span class="pick-label">Style:</span>
    <button class="pick-btn active" data-theme="a" aria-pressed="true">
      <span class="swatch swatch-a"></span>Explorer
    </button>
    <button class="pick-btn" data-theme="b" aria-pressed="false">
      <span class="swatch swatch-b"></span>Academy
    </button>
    <button class="pick-btn" data-theme="c" aria-pressed="false">
      <span class="swatch swatch-c"></span>Notebook
    </button>
  </div>
</div>

<!-- Hero -->
<header class="hero">
  <div class="hero-badge">SUBJECT · Grade N</div>
  <h1>LESSON TITLE</h1>
  <p>One-sentence description of what students will explore.</p>
  <!-- Optional formula pill — uncomment and style per theme overrides if needed:
  <div class="formula-pill">FORMULA</div>
  -->
</header>

<!-- Lesson content -->
<main class="wrap">

  <!--
    Suggested card structure for a lesson:

    <div class="card">
      <div class="card-head">
        <div class="c-icon">EMOJI</div>
        Section Title
        <span class="c-chip">Story / Interactive / Math</span>
      </div>
      ...content...
    </div>

    Sections to include:
      1. Story card    — relatable scenario that sets up the concept
      2. Interactive card — sliders / inputs driving an SVG or canvas visual
      3. Steps card    — step-by-step formula derivation (reactive to interactive)
      4. Insight card  — historical note, fun fact, or "why it matters"
  -->

</main>

<script>
(function () {
  'use strict';

  /* ── Theme switcher ─────────────────────────────────── */
  const body = document.body;
  const btns = document.querySelectorAll('.pick-btn');

  function applyTheme(t, save) {
    body.classList.remove('theme-a', 'theme-b', 'theme-c');
    body.classList.add('theme-' + t);
    btns.forEach(b => {
      const on = b.dataset.theme === t;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', on);
    });
    if (save) localStorage.setItem('edu-theme', t);
  }

  btns.forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme, true)));

  // Restore last chosen theme across all lessons
  const saved = localStorage.getItem('edu-theme');
  if (saved && ['a', 'b', 'c'].includes(saved)) applyTheme(saved, false);

  /* ── Lesson JavaScript ──────────────────────────────── */
  // Build your interactive lesson logic here.

  // Fire a GA event when a student completes the main interaction:
  // gtag('event', 'lesson_complete', { lesson: 'LESSON_SLUG' });

})();
</script>

</body>
